name: Bug report
description: Report something broken or behaving unexpectedly.
title: "[bug]: "
labels: ["bug"]
body:
  - type: input
    id: game-url
    attributes:
      label: Game URL
      description: The game URL where this happened.
      placeholder: https://rulette.grackle.club/abc123
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Android
        - iOS
        - Other
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Firefox
        - Chrome
        - Chromium
        - Brave
        - Safari
        - Opera
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Build version (in footer, may autopopulate)

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you see? What did you expect to see? Include steps to reproduce so someone else can trigger it. Video or screenshots welcome.
      placeholder: |
        1. create a game
        2. ...
        3. ...
    validations:
      required: true

