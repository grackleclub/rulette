name: Release

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version-file: go.mod

      - name: Compute next tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Reuse an existing v* tag on HEAD if present — makes reruns
          # on the same commit idempotent (no orphan tags, no skipped
          # versions).
          existing=$(git tag --points-at HEAD --list 'v*' | sort -V | tail -n1)
          if [ -n "$existing" ]; then
            echo "next=$existing" >> "$GITHUB_OUTPUT"
            echo "reuse=true" >> "$GITHUB_OUTPUT"
            echo "Reusing existing tag: $existing"
            exit 0
          fi
          latest=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            latest="v0.0.0"
          fi
          IFS='.' read -r major minor patch <<< "${latest#v}"
          # A 'feature' label on the merged PR bumps the minor version
          # (zeroing the patch), otherwise the patch is bumped. The default
          # token reads the labels via the pull-requests: read permission;
          # a direct push with no PR falls back to a patch bump.
          labels=$(gh api "repos/$GITHUB_REPOSITORY/commits/$GITHUB_SHA/pulls" \
            --jq '.[].labels[].name' 2>/dev/null || true)
          if echo "$labels" | grep -qx 'feature'; then
            minor=$((minor + 1)); patch=0
          else
            patch=$((patch + 1))
          fi
          next="v${major}.${minor}.${patch}"
          echo "next=$next" >> "$GITHUB_OUTPUT"
          echo "reuse=false" >> "$GITHUB_OUTPUT"
          echo "Next tag: $next (labels: $(echo "$labels" | paste -sd, -))"

      - name: Build binaries
        env:
          VERSION: ${{ steps.tag.outputs.next }}
        run: |
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${target%/*}"
            arch="${target#*/}"
            out="dist/rulette_${VERSION}_${os}_${arch}"
            echo "Building $out"
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 \
              go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" \
              -o "$out" .
          done
          (cd dist && sha256sum rulette_* > checksums.txt)
          ls -la dist

      - name: Create tag
        if: steps.tag.outputs.reuse != 'true'
        env:
          TAG: ${{ steps.tag.outputs.next }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.next }}
          generate_release_notes: true
          files: |
            dist/rulette_*
            dist/checksums.txt

      - name: Trigger grackleclub/cloud deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CLOUD_DISPATCH_TOKEN }}
          repository: grackleclub/cloud
          event-type: deploy-service
          client-payload: |-
            {
              "service":  "rulette",
              "instance": "rulette",
              "env":      "prod",
              "ref":      "refs/tags/${{ steps.tag.outputs.next }}",
              "tag":      "${{ steps.tag.outputs.next }}",
              "sha":      "${{ github.sha }}"
            }
