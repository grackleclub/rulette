name: Test

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: sqlc-dev/setup-sqlc@v3
      with:
        sqlc-version: '1.31.1'

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: 'stable'

    - name: Test
      run: bin/test -v

    # sqlc-generated files must be committed alongside schema changes
    - name: Verify sqlc output is committed
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "::error::sqlc produced uncommitted changes. Run ./bin/sqlc locally and commit the result."
          exit 1
        fi
