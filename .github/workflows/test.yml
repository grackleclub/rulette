name: Test

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # installs go + sqlc at the versions pinned in mise.toml, so CI and
    # local builds resolve identical toolchains
    - uses: jdx/mise-action@v2

    - name: Test
      run: bin/test -v

    # sqlc-generated files must be committed alongside schema changes
    - name: Verify sqlc output is committed
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "::error::sqlc produced uncommitted changes. Run ./bin/sqlc locally and commit the result."
          exit 1
        fi
