version: "2"
sql:
  - engine: "postgresql"
    queries: 
      - "queries/bugs.sql"
      - "queries/cache.sql"
      - "queries/cards.sql"
      - "queries/event.sql"
      - "queries/game.sql"
      - "queries/game_cards.sql"
      - "queries/infractions.sql"
      - "queries/initiative.sql"
      - "queries/player.sql"
      - "queries/point_changes.sql"
      - "queries/spins.sql"
      - "queries/suggestions.sql"
    schema: "schema.sql"
    gen:
      go:
        package: "sqlc"
        out: "sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        # emit_db_tags: true
        emit_exact_table_names: true
        emit_prepared_queries: true

