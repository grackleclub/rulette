<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rulette</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
  </head>
  <body>

    <div class="card-float">
      <article class="card">
        <div class="card-logo">rulette</div>
        <form class="stack" action="/create" method="POST">
          <input type="text" id="gamename" name="gamename" placeholder="name your game" autofocus required />
          <input class="button-create" type="submit" value="CREATE GAME" />
        </form>
      </article>
    </div>

    {{ template "footer" }}
  </body>
</html>
