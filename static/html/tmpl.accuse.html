<form method="POST" action="/{{ .Game.ID }}/action/accuse" class="accuse-panel">
  <fieldset>
    <legend>Select a player</legend>
    {{ range .Players }}
    <label class="accuse-option">
      <input type="radio" name="defendant_id" value="{{ .PlayerID }}" required>
      {{ .Name }}
    </label>
    {{ end }}
  </fieldset>
  <button type="submit" class="button">Accuse</button>
  <button type="button" class="button" data-cancel-accuse>Cancel</button>
</form>
