<h2><span class="script">which</span> RULE?</h2>
{{ range .Players }}
  <article class="stack">
    <span class="player-name">{{ .Name }}</span>
    {{ $pid := .PlayerID }}
    {{ range $.CardsPlayers }}
      {{ if eq .PlayerID.Int32 $pid }}
        <form method="POST" action="/{{ $.Game.ID }}/action/accuse"
          hx-post="/{{ $.Game.ID }}/action/accuse"
          hx-swap="none"
          data-close-on-success="hey-dialog">
          <input type="hidden" name="defendant_id" value="{{ $pid }}">
          <input type="hidden" name="game_card_id" value="{{ .ID }}">
          <button type="submit" class="button-teal">{{ .Content }}</button>
        </form>
      {{ end }}
    {{ end }}
  </article>
{{ end }}
<button class="button" data-close-dialog="hey-dialog">close</button>
