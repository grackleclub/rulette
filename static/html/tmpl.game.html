<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rulette | {{ .Game.Name }}</title>
    <link rel="stylesheet" href="/static/css/style.css"> 
    <script src="/static/js/htmx.min.js"></script>
  </head>
  <body>
    <!-- <script src="index.js"></script> -->
    
    <article id="title">
      <h1>{{ .Game.Name }}</h1>
      <section id="status-fetch" hx-get="/{{ .Game.ID }}/data/status" 
        hx-target="#status" hx-trigger="load, every {{ .Config.refresh }}" hx-swap="innerHTML">
        <footer id="status">{{ .Game.StateName }}</footer>
        <footer>{{ .Game.StateDescription }}</footer>
      </section>
    </article>
    
    <section id="players" hx-get="/{{ .Game.ID }}/data/players" 
    hx-target="#players" hx-trigger="load, every {{ .Config.refresh }}" hx-swap="innerHTML">
      <article id="loading-players">
        <p>loading players...</p>
      </article>
    </section>

    <section id="table" hx-get="/{{ .Game.ID }}/data/table" 
    hx-target="#table" hx-trigger="load, refreshTable from:body, every 30s" hx-swap="innerHTML">
      <article id="loading-table">
        <p>loading table...</p>
      </article>
    </section>

    <dialog id="hey-dialog">
      <p>Who are you accusing?</p>
      {{ range .Players }}
      <form method="POST" action="/{{ $.Game.ID }}/action/accuse">
        <input type="hidden" name="defendant_id" value="{{ .PlayerID }}">
        <button type="submit" class="button">{{ .Name }}</button>
      </form>
      {{ end }}
      <button class="button" onclick="document.getElementById('hey-dialog').close()">close</button>
    </dialog>

    <section id="points" hx-get="/{{ .Game.ID }}/data/points"
    hx-target="#points" hx-trigger="load, every {{ .Config.refresh }}" hx-swap="innerHTML">
    <article id="loading-points">
      <p>loading points...</p>
    </article>
  </section>



    <footer>
      <small>
        A rule stacking game based on Season 7, Episode 7 of Game Changer on <a href="https://dropout.tv">DropoutTV</a>.
      </small>
    </footer>
  </body>
</html>
