<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rulette | {{ .Game.Name }}</title>
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
    <link rel="stylesheet" href="/static/css/style.css"> 
    <script src="/static/js/htmx.min.js"></script>
    <script src="/static/js/idiomorph-ext.min.js"></script>
    <script src="/static/js/accuse.js" defer></script>
    <script src="/static/js/modifier.js" defer></script>
  </head>
  <body hx-ext="morph">
    <div class="card-float">
      <article class="card card-game">

        <div id="title" class="stack game-title">
          <h1>{{ .Game.Name }}</h1>
          <div class="game-subtitle">
            <footer class="playing-as">playing as <span id="self">{{ .CallerName }}</span></footer>
            <section id="status-fetch" hx-get="/{{ .Game.ID }}/data/status"
              hx-target="#status-fetch" hx-trigger="load, every {{ .Config.refresh }}" hx-swap="morph:innerHTML">
            </section>
          </div>
        </div>

        <section id="table" hx-get="/{{ .Game.ID }}/data/table"
          hx-target="#table" hx-trigger="load, refreshTable from:body, every {{ .Config.refresh }}" hx-swap="morph:innerHTML">
        </section>

        <dialog id="change-points-dialog">
          <div class="dialog-body stack"
            hx-get="/{{ .Game.ID }}/data/change-points"
            hx-trigger="loadChangePoints from:body"
            hx-swap="morph:innerHTML">
          </div>
        </dialog>

        <section id="players" class="stack" hx-get="/{{ .Game.ID }}/data/players"
          hx-target="#players" hx-trigger="load, every {{ .Config.refresh }}" hx-swap="morph:innerHTML">
          <div class="loading">
            <p>loading players...</p>
          </div>
        </section>

        <section id="points" class="stack game-points">
        </section>

      </article>
    </div>

    <dialog id="hey-dialog">
      <div id="accuse-content" class="dialog-body stack"
        hx-get="/{{ .Game.ID }}/data/accuse"
        hx-trigger="loadAccuse from:body"
        hx-swap="morph:innerHTML">
        <p>Loading...</p>
      </div>
    </dialog>

    <div id="infraction-poll"
      hx-get="/{{ .Game.ID }}/data/infraction"
      hx-trigger="every {{ .Config.refresh }}"
      hx-swap="none"
      hx-on::after-request="handleInfraction(event)">
    </div>

    <dialog id="decide-dialog">
      <div class="dialog-body stack">
        <h2>Verdict</h2>
        <form hx-post="/{{ $.Game.ID }}/action/decide" hx-swap="none"
          data-close-on-success="decide-dialog">
          <input type="hidden" name="verdict" value="absolve">
          <input class="infraction-id-input" type="hidden" name="infraction_id" value="">
          <button type="submit" class="button-danger">deny</button>
        </form>
        <button class="button-teal" data-affirm>affirm</button>
      </div>
    </dialog>

    <dialog id="modifier-dialog" data-game-id="{{ .Game.ID }}">
      <div id="modifier-content" class="dialog-body"></div>
    </dialog>

    <dialog id="notice-dialog">
      <div class="dialog-body stack stack-centered">
        <p id="notice-message"></p>
        <button class="button" data-close-dialog="notice-dialog">ok</button>
      </div>
    </dialog>

    <dialog id="points-dialog">
      <div class="dialog-body stack">
        <h2>Penalty for the accused</h2>
        <form hx-post="/{{ $.Game.ID }}/action/decide" hx-swap="none"
          data-close-on-success="points-dialog">
          <input type="hidden" name="verdict" value="affirm">
          <input class="infraction-id-input" type="hidden" name="infraction_id" value="">
          <label for="points-amount">points</label>
          <input id="points-amount" type="number" name="amount" value="0" min="-99" max="99">
          <button type="submit" class="button-teal">submit</button>
        </form>
        <button class="button" data-close-dialog="points-dialog">nevermind</button>
      </div>
    </dialog>

    <dialog id="invite-dialog">
      <div class="dialog-body stack stack-centered">
        <h2>Invite players</h2>
        <img id="invite-qr" alt="join QR code">
        <a id="invite-link" class="invite-link" href="" target="_blank" rel="noopener"></a>
        <small id="invite-copy-success" aria-live="polite" hidden>copied to clipboard!</small>
        <small id="invite-copy-failure" aria-live="polite" hidden>could not copy to clipboard.</small>
        <button class="button" data-close-dialog="invite-dialog">close</button>
      </div>
    </dialog>

    {{ template "footer" }}
  </body>
</html>
