<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rulette | {{ .Data.ID }}</title>
    <meta name="description" content="You're invited to a game of Rulette. Enter your name to join and start stacking rules.">
    <!-- link preview (Open Graph + Twitter Card) -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Rulette">
    <meta property="og:title" content="Join a game of Rulette">
    <meta property="og:description" content="You're invited to a game of Rulette. Enter your name to join and start stacking rules.">
    <meta property="og:url" content="{{ .BaseURL }}/{{ .Data.ID }}/join">
    <meta property="og:image" content="{{ .BaseURL }}/static/img/preview.png">
    <meta property="og:image:width" content="1080">
    <meta property="og:image:height" content="644">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Join a game of Rulette">
    <meta name="twitter:description" content="You're invited to a game of Rulette. Enter your name to join.">
    <meta name="twitter:image" content="{{ .BaseURL }}/static/img/preview.png">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
  </head>
  <body>
    <div class="card-float">
      <article class="card card-join">
        <div class="stack game-title">
          <div class="card-logo">rulette</div>
        </div>
        <div class="stack join-group">
          <form class="stack" action="/{{ .Data.ID }}/join" method="POST">
            <div class="input-wrap">
              <input type="text" id="username" name="username" placeholder="enter name" autocomplete="off" autofocus required aria-describedby="cookie-info" />
              <button type="button" class="info-toggle" aria-expanded="false" aria-controls="cookie-info"
                onclick="var b=document.getElementById('cookie-info'),v=b.getAttribute('aria-hidden')==='true';b.setAttribute('aria-hidden',!v);this.setAttribute('aria-expanded',v)">i</button>
              <div class="info-bubble" id="cookie-info" role="note" aria-hidden="true">
                <p>Only one session cookie is set.</p>
                <p>No ads or tracking.</p>
              </div>
            </div>
            <input class="button-create" type="submit" value="JOIN GAME" />
          </form>
        </div>
      </article>
    </div>
    {{ template "footer" . }}
  </body>
</html>
