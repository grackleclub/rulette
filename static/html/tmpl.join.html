<!DOCTYPE html>
<html lang="{{locale}}">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{Tx "app.name"}} | {{ .Name }}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
  </head>
  <body>
    <div class="card-float">
      <article class="card">
        <div class="stack game-title">
          <h1>{{ .Name }}</h1>
        </div>
        <form class="stack" action="/{{ .ID }}/join" method="POST">
          <input type="text" id="username" name="username" placeholder="{{Tx "join.username_placeholder"}}" autofocus required />
          <input class="button-create" type="submit" value="{{Tx "join.submit"}}" />
        </form>
      </article>
    </div>
    {{ template "footer" }}
  </body>
</html>
