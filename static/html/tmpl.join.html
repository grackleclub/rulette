<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rulette | {{ .ID }}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
  </head>
  <body>
    <div class="card-float">
      <article class="card card-join">
        <div class="stack game-title">
          <div class="card-logo">rulette</div>
        </div>
        <div class="stack join-group">
          <form class="stack" action="/{{ .ID }}/join" method="POST">
            <div class="input-wrap">
              <input type="text" id="username" name="username" placeholder="enter name" autocomplete="off" autofocus required />
              <button type="button" class="info-toggle" aria-label="cookie info">i</button>
              <div class="info-bubble">
                <p>Only one session cookie is set.</p>
                <p>No ads or tracking.</p>
              </div>
            </div>
            <input class="button-create" type="submit" value="JOIN GAME" />
          </form>
        </div>
      </article>
    </div>
    {{ template "footer" . }}
  </body>
</html>
