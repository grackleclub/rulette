<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rulette | {{ .Name }}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
  </head>
  <body>
    <div class="card-float">
      <article class="card">
        <h2>{{ .Name }}</h2>
        <form class="stack" action="/{{ .ID }}/join" method="POST">
          <input type="text" id="username" name="username" placeholder="enter name" autofocus required />
          <input class="button-create" type="submit" value="JOIN GAME" />
        </form>
      </article>
    </div>
    {{ template "footer" }}
  </body>
</html>
