{{ $cards := .CardsPlayers }}
<div class="card-float">
  <article class="card">
    <section class="stack">
      {{ range .Players }}
        {{ $pid := .PlayerID }}
        <article id="player-{{ .PlayerID }}" class="player stack">
          <div>{{ .Name }}</div>
          <div>points: {{ .Points.Value }}</div>
          <div>{{ .Initiative }}</div>
          <div class="stack">
            {{ range $cards }}
              {{ if eq .PlayerID.Int32 $pid }}
                <div>{{ .Content }}</div>
              {{ end }}
            {{ end }}
          </div>
        </article>
      {{ end }}
      {{ if eq .Game.StateName "inviting" }}
        <div class="invite">
          <a href="/{{ .Game.ID }}/join" class="button">Invite Players</a>
        </div>
      {{ end }}
    </section>
  </article>
</div>
