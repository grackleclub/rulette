
  <!-- TODO: add head to this page or not -->
  <body>
    {{ $cards := .CardsPlayers }}
    <div class="card-float">
      <div class="card">
        <article id="players" class="players">
          <!-- <h2>players</h2> -->
          {{ range .Players }}
            {{ $pid := .PlayerID }}
            <section id="player-{{ .PlayerID }}" class="player">
              <div>{{ .Name }}</div>
              <div>points: {{ .Points.Value }}</div>
              <div>{{ .Initiative }}</div>
              <div>
                <!-- TODO: only show that player's cards? -->
                {{ range $cards }}
                  {{ if eq .PlayerID.Int32 $pid }}
                  <div>{{ .Content }}</div>
                  {{ end }}
                {{ end }}
              </div>
              <!-- TODO: handle cards -->
            </section>
          {{ end }}
          {{ if eq .Game.StateName "inviting" }}
          <section class="invite">
            <a href="/{{ .Game.ID }}/join" class="button">Invite Players</a>
          </section>
          {{ end }}
        </article>
      </div>
    </div>
  </body>
