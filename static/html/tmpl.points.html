{{ $cid := .CallerID }}
{{ $isHost := false }}
{{ range .Players }}
  {{ if and (eq .Initiative.Int32 0) (eq $cid .PlayerID) }}
    {{ $isHost = true }}
  {{ end }}
{{ end }}
{{ if $isHost }}
<h2>Change Points</h2>
<div class="actions">
  <button class="button" data-open-dialog="change-points-dialog" data-fetch-event="loadChangePoints">
    Change Points
  </button>
</div>
{{ end }}
