{{ $cid := .CallerID }}
{{ $isHost := false }}
{{ range .Players }}
  {{ if and (eq .Initiative.Int32 0) (eq $cid .PlayerID) }}
    {{ $isHost = true }}
  {{ end }}
{{ end }}
{{ if $isHost }}
<h2>Change Points</h2>
<div class="actions">
  <button class="button" onclick="
    document.querySelectorAll('#change-points-dialog form').forEach(f => f.reset());
    document.getElementById('change-points-dialog').showModal()">
    Change Points
  </button>
</div>
{{ end }}
